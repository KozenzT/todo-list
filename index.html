<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

  <h1>📝 My Todo List</h1>

  <p class="subtitle">
    จัดการงานของคุณให้เป็นระเบียบ 🚀
</p>

  <div class="input-box">
    <input type="text" id="todoInput" placeholder="เพิ่มงาน...">
    <button id="addBtn">เพิ่ม</button>
  </div>

  <div class="stats">
      <div class="card">
          <h3 id="totalCount">0</h3>
          <p>ทั้งหมด</p>
      </div>

      <div class="card">
          <h3 id="doneCount">0</h3>
          <p>เสร็จแล้ว</p>
      </div>

      <div class="card">
          <h3 id="leftCount">0</h3>
          <p>คงเหลือ</p>
      </div>
  </div>

  <ul id="todoList"></ul>

</div>
  
<script src="script.js"></script>

</body>
</html>
